name: Feature request
description: Suggest a focused improvement to Codex Usage Guard
title: "[Feature]: "
body:
  - type: markdown
    attributes:
      value: |
        Please describe the user problem first. Small, focused proposals are easier to evaluate.

  - type: textarea
    id: problem
    attributes:
      label: Problem to solve
      description: What is difficult, missing, or unreliable today?
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: Describe the behavior you would like to see.
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered

  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: Add examples, constraints, or links. Do not include private account data.
