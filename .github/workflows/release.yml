name: release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: read

env:
  BUN_VERSION: 1.3.14

jobs:
  verify:
    name: Verify release
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Check out repository
        uses: actions/checkout@v7.0.1

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2.2.0
        with:
          bun-version: ${{ env.BUN_VERSION }}

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Lint
        run: bun run lint

      - name: Run tests with coverage
        run: bun run test:coverage

      - name: Check tag matches package version
        shell: bash
        run: |
          tag_version="${GITHUB_REF_NAME#v}"
          package_version="$(bun -e 'const pkg = await Bun.file("package.json").json(); console.log(pkg.version)')"
          test "$tag_version" = "$package_version"

  build:
    name: Build ${{ matrix.target }}
    needs: verify
    runs-on: ubuntu-latest
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: darwin-arm64
            bun_target: bun-darwin-arm64
          - target: darwin-x64
            bun_target: bun-darwin-x64
          - target: linux-arm64
            bun_target: bun-linux-arm64
          - target: linux-x64
            bun_target: bun-linux-x64
    steps:
      - name: Check out repository
        uses: actions/checkout@v7.0.1

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2.2.0
        with:
          bun-version: ${{ env.BUN_VERSION }}

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build standalone executable
        run: |
          mkdir -p dist package
          bun build ./src/cli.ts \
            --compile \
            --target=${{ matrix.bun_target }} \
            --outfile=dist/codex-usage-guard-${{ matrix.target }}
          cp dist/codex-usage-guard-${{ matrix.target }} package/codex-usage-guard
          tar -czf codex-usage-guard-${{ matrix.target }}.tar.gz \
            -C package codex-usage-guard

      - name: Upload release archive
        uses: actions/upload-artifact@v7.0.1
        with:
          name: release-${{ matrix.target }}
          path: codex-usage-guard-${{ matrix.target }}.tar.gz
          if-no-files-found: error
          retention-days: 7

  publish:
    name: Publish GitHub release
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: write
    steps:
      - name: Download release archives
        uses: actions/download-artifact@v8.0.1
        with:
          pattern: release-*
          path: dist
          merge-multiple: true

      - name: Generate SHA-256 checksums
        run: (cd dist && sha256sum *.tar.gz > SHA256SUMS)

      - name: Publish release and assets
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "$GITHUB_REF_NAME" \
            dist/*.tar.gz \
            dist/SHA256SUMS \
            --repo "$GITHUB_REPOSITORY" \
            --title "codex-usage-guard $GITHUB_REF_NAME" \
            --generate-notes \
            --verify-tag
