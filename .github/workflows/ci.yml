name: ci

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14
      - run: bun install --frozen-lockfile
      - run: bun run lint
      - run: bun run test:coverage
      - run: bun build ./src/cli.ts --compile --outfile dist/codex-usage-guard-linux-x64
      - run: ./dist/codex-usage-guard-linux-x64 --help
      - run: sha256sum dist/codex-usage-guard-linux-x64 > dist/SHA256SUMS

  cross-build:
    strategy:
      matrix:
        include:
          - target: darwin-arm64
            bun_target: bun-darwin-arm64
          - target: darwin-x64
            bun_target: bun-darwin-x64
          - target: linux-arm64
            bun_target: bun-linux-arm64
          - target: linux-x64
            bun_target: bun-linux-x64
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14
      - run: bun install --frozen-lockfile
      - run: bun build ./src/cli.ts --compile --target=${{ matrix.bun_target }} --outfile=dist/codex-usage-guard-${{ matrix.target }}
      - run: tar -czf dist/codex-usage-guard-${{ matrix.target }}.tar.gz -C dist codex-usage-guard-${{ matrix.target }}
      - run: sha256sum dist/codex-usage-guard-${{ matrix.target }}* > dist/SHA256SUMS-${{ matrix.target }}
